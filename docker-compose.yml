services:
  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - qdrant
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: ["python", "-m", "mmrag.cli.main", "serve", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  qdrant_data:

